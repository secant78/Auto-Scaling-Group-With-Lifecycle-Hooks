name: 3 - Teardown

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'yes' to confirm teardown of all resources"
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  teardown:
    name: Destroy All Infrastructure
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'yes'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install boto3

      - name: Run teardown
        run: python teardown.py

      - name: Verify cleanup
        run: |
          echo "=== Checking for remaining resources ==="
          ASG=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names web-asg-sean \
            --query 'length(AutoScalingGroups)' \
            --output text 2>/dev/null || echo 0)
          echo "ASG remaining: $ASG"

          LAMBDA=$(aws lambda get-function \
            --function-name asg-lifecycle-handler-sean \
            --query 'Configuration.FunctionName' \
            --output text 2>/dev/null || echo "none")
          echo "Lambda remaining: $LAMBDA"

          echo "Teardown verification complete."
